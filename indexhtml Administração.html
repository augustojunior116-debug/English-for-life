<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Augusto & Laurindo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
        h1 { color: #1E3A5F; margin-bottom: 8px; }
        input, button { padding: 12px 16px; border-radius: 40px; border: 1px solid #CBD5E0; font-family: inherit; }
        button { background: #E67E22; color: white; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        button:hover { background: #D35400; }
        .form-group { margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #E2E8F0; }
        th { background: #1E3A5F; color: white; }
        .delete-btn { background: #EF4444; padding: 6px 12px; font-size: 0.8rem; }
        .delete-btn:hover { background: #DC2626; }
        .message { margin-top: 16px; padding: 12px; border-radius: 16px; }
        .error { background: #FEE2E2; color: #991B1B; }
        .success { background: #D1FAE5; color: #065F46; }
    </style>
</head>
<body>
<div class="container" id="adminContent">
    <h1>👨🏫 Gestão de Alunos</h1>
    <p>Adicione ou remova alunos (e‑mail + senha individual). Os dados são guardados no seu navegador e partilhados com a página do curso.</p>

    <div id="loginPanel">
        <h2>🔒 Acesso restrito</h2>
        <p>Digite a senha mestra para continuar:</p>
        <input type="password" id="masterPassword" placeholder="Senha mestra">
        <button id="loginAdminBtn">Entrar</button>
        <div id="loginMsg" class="message" style="display:none;"></div>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="form-group">
            <input type="email" id="studentEmail" placeholder="E-mail do aluno" style="flex:2;">
            <input type="text" id="studentPassword" placeholder="Senha (ex: aluno123)" style="flex:2;">
            <button id="addStudentBtn">➕ Adicionar</button>
        </div>

        <h3>📋 Lista de alunos</h3>
        <table id="studentsTable">
            <thead><tr><th>E‑mail</th><th>Senha (oculta)</th><th>Ações</th></tr></thead>
            <tbody id="studentsList"></tbody>
        </table>
        <div id="adminMsg" class="message" style="display:none;"></div>
    </div>
</div>

<script>
    const MASTER_PASSWORD = "admin2025";  // Altere a senha mestra aqui
    const STORAGE_KEY = "augusto_laurindo_alunos";

    function loadStudents() {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : [];
    }
    function saveStudents(students) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
    }
    function renderStudentsList() {
        const students = loadStudents();
        const tbody = document.getElementById('studentsList');
        tbody.innerHTML = '';
        students.forEach((student, index) => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = student.email;
            row.insertCell(1).textContent = '•'.repeat(student.password.length);
            const deleteCell = row.insertCell(2);
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = 'Remover';
            deleteBtn.className = 'delete-btn';
            deleteBtn.onclick = () => {
                if (confirm(`Remover ${student.email}?`)) {
                    students.splice(index, 1);
                    saveStudents(students);
                    renderStudentsList();
                    showAdminMsg(`Aluno ${student.email} removido.`, 'success');
                }
            };
            deleteCell.appendChild(deleteBtn);
        });
        if (students.length === 0) {
            const row = tbody.insertRow();
            const cell = row.insertCell(0);
            cell.colSpan = 3;
            cell.textContent = 'Nenhum aluno cadastrado ainda.';
            cell.style.textAlign = 'center';
            cell.style.color = '#64748B';
        }
    }
    function showAdminMsg(msg, type) {
        const msgDiv = document.getElementById('adminMsg');
        msgDiv.textContent = msg;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.style.display = 'none', 3000);
    }
    function showLoginMsg(msg, type) {
        const msgDiv = document.getElementById('loginMsg');
        msgDiv.textContent = msg;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.style.display = 'none', 3000);
    }

    document.getElementById('loginAdminBtn').addEventListener('click', () => {
        const pass = document.getElementById('masterPassword').value;
        if (pass === MASTER_PASSWORD) {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            renderStudentsList();
        } else {
            showLoginMsg('Senha mestra incorreta.', 'error');
        }
    });

    document.getElementById('addStudentBtn').addEventListener('click', () => {
        const email = document.getElementById('studentEmail').value.trim();
        const password = document.getElementById('studentPassword').value.trim();
        if (!email || !password) {
            showAdminMsg('Preencha e‑mail e senha.', 'error');
            return;
        }
        const students = loadStudents();
        if (students.find(s => s.email === email)) {
            showAdminMsg('Este e‑mail já está cadastrado.', 'error');
            return;
        }
        students.push({ email, password });
        saveStudents(students);
        renderStudentsList();
        document.getElementById('studentEmail').value = '';
        document.getElementById('studentPassword').value = '';
        showAdminMsg(`Aluno ${email} adicionado com sucesso!`, 'success');
    });
</script>
</body>
</html>
